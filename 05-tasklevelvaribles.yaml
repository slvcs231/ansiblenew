- name: play form variables
  hosts:  frontend
  vars:
    COURSE: Devops with Ansible
    DURATION: 10hrs
    TRAINER:  Reddiah
  tasks:  
  - name: print the COURSE info
    vars:
      COURSE: Ansible
    ansible.builtin.debug:
      msg:  "Course Name is: {{COURSE}}, Duration is: {{DURATION}}, Trainer Name is: {{TRAINER}}"